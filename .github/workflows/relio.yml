name: Run Relio Analysis

on:
  workflow_dispatch:
    inputs:
      compound:
        description: 'Compound name'
        required: true
        default: 'Turmeric'
      outcome:
        description: 'Outcome'
        required: true
        default: 'Infection'
      mode:
        description: 'Mode: 1 for FAST, 2 for FULL'
        required: true
        default: '1'

jobs:
  run-relio:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests networkx matplotlib tqdm lxml biopython

      - name: Run Relio analysis
        run: |
          python relio_job.py "${{ github.event.inputs.compound }}" "${{ github.event.inputs.outcome }}" "${{ github.event.inputs.mode }}"

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: relio-results
          path: |
            Relio_report.txt
            Relio_maze.png
