name: Run Relio Analysis

on:
  workflow_dispatch:
    inputs:
      compound:
        description: 'Compound name'
        required: true
        default: 'Turmeric'
      outcome:
        description: 'Biological outcome'
        required: true
        default: 'Infection'
      mode:
        description: 'Mode: 1 for FAST, 2 for FULL'
        required: true
        default: '1'
      job_id:
        description: 'Job ID'
        required: false

jobs:
  run-relio:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests networkx matplotlib tqdm lxml biopython

      - name: Run Relio analysis
        run: |
          python relio_job.py "${{ github.event.inputs.compound }}" "${{ github.event.inputs.outcome }}" "${{ github.event.inputs.mode }}" "${{ github.event.inputs.job_id }}"

      - name: Save results
        run: |
          mkdir -p results
          python -c "
import json, sys, os
job_id = sys.argv[4]
results_data = {'status': 'done', 'images': {'maze': 'maze.png'}}
with open(f'results/{job_id}.json', 'w') as f:
    json.dump(results_data, f)
" "${{ github.event.inputs.compound }}" "${{ github.event.inputs.outcome }}" "${{ github.event.inputs.mode }}" "${{ github.event.inputs.job_id }}"

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: relio-results
          path: results/
