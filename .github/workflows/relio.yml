name: Relio Analysis Workflow

on:
  workflow_dispatch:
    inputs:
      compound:
        description: 'Compound name'
        required: true
        type: string
      outcome:
        description: 'Biological outcome'
        required: true
        type: string
      mode:
        description: 'Analysis mode (FAST or FULL)'
        required: true
        type: choice
        options:
          - FAST
          - FULL
      job_id:
        description: 'Unique job identifier'
        required: true
        type: string

jobs:
  relio-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            biopython \
            networkx \
            matplotlib \
            requests \
            lxml \
            tqdm \
            Pillow

      # matplotlib needs a virtual display on headless Ubuntu.
      # The Agg backend (set in relio_job.py) handles this,
      # but installing this package makes it bulletproof.
      - name: Install virtual display support
        run: |
          sudo apt-get install -y python3-tk

      - name: Create Output Directories
        run: |
          mkdir -p python_runner/results
          mkdir -p python_runner/images

      - name: Run Relio Analysis
        env:
          COMPOUND: ${{ github.event.inputs.compound }}
          OUTCOME:  ${{ github.event.inputs.outcome }}
          MODE:     ${{ github.event.inputs.mode }}
          JOB_ID:   ${{ github.event.inputs.job_id }}
          MPLBACKEND: Agg
        run: |
          cd python_runner
          python relio_job.py

      - name: Verify Output Files
        run: |
          echo "=== RESULTS DIR ==="
          ls -lh python_runner/results/ || echo "results/ is empty"
          echo "=== IMAGES DIR ==="
          ls -lh python_runner/images/ || echo "images/ is empty"
          echo "=== JSON CONTENT (images field only) ==="
          python3 -c "
          import json, glob
          files = glob.glob('python_runner/results/*.json')
          for f in files:
              with open(f) as fp:
                  d = json.load(fp)
              imgs = d.get('images', {})
              # Print everything except the base64 blob itself
              summary = {k: (v[:80] + '...') if isinstance(v, str) and len(v) > 80 else v
                         for k, v in imgs.items()}
              print(f'{f}: images = {summary}')
              print(f'  genes count : {len(d.get(\"genes\", []))}')
              print(f'  sources count: {len(d.get(\"sources\", []))}')
              print(f'  status      : {d.get(\"status\")}')
          "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: relio-results-${{ github.event.inputs.job_id }}
          path: |
            python_runner/results/
            python_runner/images/
          retention-days: 7

      - name: Commit Results to Repository
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add python_runner/results/ python_runner/images/ || true
          git diff --cached --quiet || git commit -m "Relio results: ${{ github.event.inputs.compound }} + ${{ github.event.inputs.outcome }} [job ${{ github.event.inputs.job_id }}]"
          git push || true
