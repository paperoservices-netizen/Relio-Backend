name: Run Relio Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-relio:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests networkx matplotlib tqdm lxml biopython

      - name: Run Relio analysis
        run: |
          python relio_main.py

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: relio-results
          path: |
            Relio_report.txt
            Relio_maze.png
