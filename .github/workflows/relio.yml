name: Relio Analysis Workflow

on:
  workflow_dispatch:
    inputs:
      compound:
        description: 'Compound name'
        required: true
        type: string
      outcome:
        description: 'Biological outcome'
        required: true
        type: string
      mode:
        description: 'Analysis mode (FAST or FULL)'
        required: true
        type: choice
        options:
          - FAST
          - FULL
      job_id:
        description: 'Unique job identifier'
        required: true
        type: string

jobs:
  relio-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install biopython networkx matplotlib requests lxml tqdm Pillow

      - name: Create Results Directory
        run: |
          mkdir -p python_runner/results
          mkdir -p python_runner/images

      - name: Run Relio Analysis
        env:
          COMPOUND: ${{ github.event.inputs.compound }}
          OUTCOME: ${{ github.event.inputs.outcome }}
          MODE: ${{ github.event.inputs.mode }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          cd python_runner
          python relio_job.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: relio-results-${{ github.event.inputs.job_id }}
          path: |
            python_runner/results/
            python_runner/images/
          retention-days: 1

      - name: Commit Results to Repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add python_runner/results/ python_runner/images/ || true
          git commit -m "Relio results for job ${{ github.event.inputs.job_id }}" || true
          git push || true
